<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ordinary Game Jam #1 — Lobby</title>
<link rel="stylesheet" href="style.css" />
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
  }
}
</script>
</head>
<body>
<div id="hud">
  <div id="username">loading…</div>
  <div id="traveler"></div>
  <div id="peers">1 online</div>
  <div id="hint">WASD to move, Space to jump — click to look, scroll to zoom, Esc to release — T or Enter to chat</div>
</div>

<audio id="bgm" loop preload="metadata" src="Forked%20Reflections.mp3"></audio>

<div id="audio-controls" aria-label="music controls">
  <button id="audio-toggle" type="button" aria-pressed="false">mute</button>
  <input id="audio-volume" type="range" min="0" max="100" value="32" aria-label="music volume" />
</div>

<div id="chat-box">
  <div id="chat-history"></div>
</div>
<input id="chat-input" type="text" maxlength="200" autocomplete="off" placeholder="press Enter to send, Esc to cancel" />

<div id="choose">
  <div class="panel">
    <div id="name-field" class="name-field" hidden>
      <label for="name-input">what should we call you?</label>
      <input id="name-input" type="text" maxlength="24" autocomplete="off" placeholder="a name, up to 24 characters" />
    </div>
    <h1>choose a traveler</h1>
    <p class="sub">one pick, then you're off</p>
    <div class="cards">
      <button class="card" data-key="spark">
        <div class="swatch" style="background:#e8b64c"></div>
        <div class="name">Spark</div>
        <div class="desc">quick on their feet</div>
      </button>
      <button class="card" data-key="drift">
        <div class="swatch" style="background:#7fb9ae"></div>
        <div class="name">Drift</div>
        <div class="desc">steady, curious</div>
      </button>
      <button class="card" data-key="wander">
        <div class="swatch" style="background:#a892c6"></div>
        <div class="name">Wander</div>
        <div class="desc">takes their time</div>
      </button>
    </div>
  </div>
</div>

<canvas id="game"></canvas>
<script src="portal.js"></script>
<script type="module" src="game.js"></script>
</body>
</html>
